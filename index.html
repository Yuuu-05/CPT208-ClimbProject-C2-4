<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HoldLight Project Overview</title>
  <link rel="stylesheet" href="portfolio.css">
  <script src="portfolio.js" defer></script>
</head>
<body class="overview-page">
  <section class="holdlight-overview-section" aria-label="HoldLight Project Overview">
    <div class="nebula"></div>
    <div class="grid-plane"></div>

    <div class="stars-container" aria-hidden="true">
      <div class="star-layer"></div>
      <div class="star-layer"></div>
      <div class="star-layer"></div>
    </div>

    <div class="button-container">
      <div class="button-hexagons" aria-hidden="true">
        <div class="hexagon"></div>
        <div class="hexagon"></div>
        <div class="hexagon"></div>
        <div class="hexagon"></div>
        <div class="hexagon"></div>
        <div class="hexagon"></div>
      </div>

      <div class="digital-glyphs" aria-hidden="true">
        <div class="digital-glyph">BLV ROUTE ACCESS · ACTIVE</div>
        <div class="digital-glyph">LAYERED_PREVIEW.INIT()</div>
        <div class="digital-glyph">BRIEF CUE · REPEAT · PAUSE · HELP</div>
        <div class="digital-glyph">HUMAN FALLBACK AVAILABLE</div>
        <div class="digital-glyph">ROUTE ACTION · LOW OVERLOAD</div>
        <div class="digital-glyph">SCAN → PREVIEW → CLIMB</div>
        <div class="digital-glyph">CONFIDENCE BEFORE ASCENT</div>
        <div class="digital-glyph">UNCERTAINTY_STATE.VISIBLE</div>
        <div class="digital-glyph">ASSISTANT CHECK READY</div>
        <div class="digital-glyph">AUDIO-FIRST SUPPORT</div>
        <div class="digital-glyph">HOLD MAP · HUMAN BACKUP</div>
        <div class="digital-glyph">LOW VISION MODE ONLINE</div>
      </div>

      <button class="holo-button" type="button" aria-label="Project overview for HoldLight" data-overview-target="modules.html">
        <div class="button-text">
          <span class="overview-kicker">Project Overview</span>
          <span class="overview-title">HoldLight</span>
          <span class="overview-copy">
            A mobile-first accessible climbing support system for blind and low-vision climbers.
            HoldLight helps users scan an indoor climbing wall, preview the route in layers,
            receive short direction-first audio cues during climbing, and recover through repeat,
            pause, more detail, or human help when guidance becomes uncertain.
          </span>

          <span class="overview-tags" aria-hidden="true">
            <span>Layered Route Preview</span>
            <span>Brief Audio Cueing</span>
            <span>Explicit Fallback</span>
          </span>
        </div>

        <div class="holo-glow"></div>
        <div class="button-glitch"></div>

        <div class="corner-accents" aria-hidden="true">
          <div class="corner-accent"></div>
          <div class="corner-accent"></div>

        <div class="holo-lines" aria-hidden="true">

        <div class="scan-line"></div>

        <div class="holo-particles" aria-hidden="true">

          <div class="holo-particle"></div>

          <div class="holo-particle"></div>
